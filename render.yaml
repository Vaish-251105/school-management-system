services:
  - type: web
    name: school-erp-api
    env: node
    plan: free
    rootDir: BACKEND
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5000
      - key: NODE_VERSION
        value: 20
